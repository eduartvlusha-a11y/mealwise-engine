<script>
function generatePlan() {
  const budget = document.getElementById("budget").value;
  const goal = document.getElementById("goal").value;

  const weeklyCost = Math.floor(budget / 4);
  const baseline = weeklyCost + 20;
  const savings = baseline - weeklyCost;

  document.getElementById("result").innerHTML = `
    <h3>System Output</h3>

    <p><strong>Goal:</strong> ${goal}</p>
    <p><strong>Weekly Budget:</strong> €${weeklyCost}</p>

    <h4>Weekly Plan</h4>
    <ul>
      <li>Day 1: Chicken + Rice</li>
      <li>Day 2: Pasta + Vegetables</li>
      <li>Day 3: Eggs + Potatoes</li>
    </ul>

    <h4>Grocery List</h4>
    <ul>
      <li>Chicken — 1.2kg</li>
      <li>Rice — 800g</li>
      <li>Eggs — 12 units</li>
      <li>Vegetables — mixed</li>
    </ul>

    <h4>Cost Optimization</h4>
    <p>Baseline: €${baseline}</p>
    <p>Optimized: €${weeklyCost}</p>

    <p style="color:green; font-weight:bold;">
      Weekly Savings: €${savings} (${Math.round((savings / baseline) * 100)}%)
    </p>

    <p style="color:#555;">
      Generated using deterministic pricing, substitution logic, and constraint-based planning.
    </p>
  `;
}
</script>
